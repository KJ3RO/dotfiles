import = ["/Users/doyeon/.config/alacritty/colors/current.toml"]
live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
size = 14

[font.bold]
family = "Hurmit Nerd Font"
style = "Regular"

[font.bold_italic]
family = "Hurmit Nerd Font"
style = "Regular Italic"

[font.italic]
family = "Hurmit Nerd Font"
style = "Light Italic"

[font.normal]
family = "Hurmit Nerd Font"
style = "Light"

[font.offset]
y = 2

[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 0.8

[window.padding]
x = 10
y = 12
