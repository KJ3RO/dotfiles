live_config_reload: true

env:
  TERM: xterm-256color

window:
  decorations: buttonless
  dynamic_padding: false
  opacity: 0.9
  padding:
    x: 8
    y: 10

font:
  normal:
    family: "Hurmit Nerd Font"
    style: Light
  italic:
    family: "Hurmit Nerd Font"
    style: Light Italic
  bold:
    family: "Hurmit Nerd Font"
    style: Regular
  bold_italic:
    family: "Hurmit Nerd Font"
    style: Regular Italic
  size: 13
  offset:
    y: 2

import:
  - ~/.config/alacritty/colors/current.yml
