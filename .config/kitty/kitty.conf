
font_family      GoMono Nerd Font
bold_font        GoMono Nerd Font Bold
italic_font      GoMono Nerd Font Italic
bold_italic_font GoMono Nerd Font Bold Italic

font_size 13.0
modify_font cell_height 150%
hide_window_decorations titlebar-only
window_margin_width 14
cursor_blink_interval -1
cursor_shape block 
macos_quit_when_last_window_closed no
macos_colorspace default
repaint_delay 8
input_delay 1
resize_draw_strategy blank
remember_window_size no
resize_debounce_time 0.001
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_activity_symbol 
tab_title_max_length 25
tab_title_template "{fmt.fg.red}{bell_symbol}{fmt.fg.tab} {index}: {tab.active_oldest_exe} {activity_symbol}"


window_border_width 0pt
# initial_window_width 240
# initial_window_height 100

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab 10 

map cmd+t launch --type=tab --cwd=current
map cmd+n launch --type=os-window --cwd=current

symbol_map U+F0001-U+F1af0 Hack Nerd Font
symbol_map U+F8FF,U+100000-U+1018C7 SF Pro

map ctrl+- launch --location=hsplit
map ctrl+= launch --location=vsplit

background_blur 60
background_opacity 0.6

# wayland_titlebar_color system
# macos_titlebar_color system

# colors
# foreground #ebdbb2
# background #0e1018
# selection_foreground #665b53
# selection_background #ebdbb2
# color0 #282828
# color8 #928374
# color1 #cc241d
# color9 #fb4934
# color2  #98971a
# color10 #b8bb26
# color3  #d79921
# color11 #fabd2f
# color4  #458588
# color12 #83a598
# color5  #b16286
# color13 #d3869b
# color6  #689d6a
# color14 #8ec07c
# color7  #dfaf87
# color15 #ebdbb2

map opt+left resize_window narrower
map opt+right resize_window wider
map opt+up resize_window taller
map opt+down resize_window shorter 3
# reset all windows in the tab to default sizes
map opt+h resize_window reset

# END_KITTY_THEME


# BEGIN_KITTY_THEME
# Kanagawa
include current-theme.conf
# END_KITTY_THEME
